# Single-host deployment: Postgres + the app (API that also serves the SPA).
# Copy .env.docker.example to .env and set at least JWT_SECRET before `docker compose up`.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: lahmanison
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/lahmanison?schema=public
      # REQUIRED: a long random string. Generate with `openssl rand -hex 32`.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your environment or .env}
      # 'local' persists to the uploads volume below; 's3' uses object storage.
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
    ports:
      - '3001:3001'
    volumes:
      # Persists uploaded files across restarts when STORAGE_DRIVER=local.
      - uploads:/app/uploads

volumes:
  db-data:
  uploads:
